.tright{display:flex;align-items:center;gap:12px}
.syncpill{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--ink2);background:var(--surf);border:1px solid var(--line);border-radius:20px;padding:6px 12px;font-weight:600}

.notionlink:hover{border-color:var(--pri);color:var(--pri2)}
.cdbadge{display:flex;flex-direction:column;align-items:flex-end;line-height:1.1}
.cdbadge b{font-family:'Space Grotesk';font-size:15px;color:var(--bad)}
.cdbadge span{font-size:10px;color:var(--mut);letter-spacing:.1em}
.btn{font-size:13px;font-weight:600;border-radius:10px;padding:9px 15px;border:1px solid var(--line);background:var(--surf);color:var(--ink);cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:.15s;font-family:'Noto Sans TC'}
.btn:hover{border-color:var(--pri)}
.btn.pri{background:var(--pri);color:#fff;border-color:var(--pri);box-shadow:0 6px 16px -6px var(--pri)}
.btn.pri:hover{background:var(--pri2)}
.btn.ghost{background:none}
.btn.sm{padding:6px 11px;font-size:12px}
.scroll{flex:1;overflow-y:auto;padding:26px 30px 60px;position:relative;z-index:1}
.screen{max-width:1120px;margin:0 auto;display:flex;flex-direction:column;gap:20px}
.hero{position:relative;overflow:hidden;border-radius:18px;border:1px solid var(--line);background:linear-gradient(135deg,color-mix(in srgb,var(--prisoft) 74%,transparent),color-mix(in srgb,var(--surf) 42%,transparent));padding:26px 28px;display:grid;grid-template-columns:1fr 210px;gap:24px}

.hi{position:relative;z-index:1}
.herotop{display:flex;align-items:center;gap:11px;margin-bottom:9px;flex-wrap:wrap}
.greet{font-size:12px;color:var(--pri2);font-weight:700;letter-spacing:.05em;font-family:'Space Grotesk'}

.hero h2{font-size:27px;margin:0 0 4px;font-weight:900;line-height:1.25}

.quote{font-size:15px;color:var(--ink);line-height:1.7;font-weight:600}

function saveDaily(flush){if(app.serverOn)api('/api/daily','PUT',{日期:today(),專注分鐘:Math.floor(todaySec()/60),完成關卡:Object.keys(app.questDone).length,XP:Object.keys(app.questDone).length*120,分心次數:app.distractions,達標:!!(app.plan[lkey()]&&app.plan[lkey()].done)},{keepalive:!!flush}).catch(()=>{});}

function copy(t){if(navigator.clipboard)navigator.clipboard.writeText(t).then(()=>toast('已複製'),()=>toast('請手動複製'));else toast('請手動複製');}
function download(n,t){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([t],{type:'text/markdown;charset=utf-8'}));a.download=n;a.click();toast('已匯出 '+n);}
function pillStyle(s){const c=SUBJ[s]||{color:'#7d97b0',soft:'#e3eaf0'};return 'background:'+c.soft+';color:'+c.color;}
function hhmm(sec){const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60);return h?(h+'.'+Math.round(m/6)+'h'):(m+' 分');}

 // funnel
 const fnNew=cnt(w=>w.status==='新錯題');const fn1=cnt(w=>w.status==='複習中'&&w.streak<=1);const fn2=cnt(w=>w.status==='複習中'&&w.streak>=2);const fnDone=cnt(w=>w.status==='已攻克');const fmax=Math.max(1,fnNew,fn1,fn2,fnDone);
 const funnel=[['新錯題','剛記下 · 明天首複','var(--bad)',fnNew],['第一輪','答對 1 次 · 隔 3 天','#d2a96b',fn1],['鞏固中','答對 2 次以上 · 隔 7-14 天','#b0a17a',fn2],['已攻克','連對 3 次 · 封存','var(--good)',fnDone]].map(r=>`<div class="fnrow"><div class="fnhead"><span class="fndot" style="background:${r[2]}"></span><b>${r[0]}</b><span class="fndesc">${r[1]}</span><span class="fnn disp">${r[3]}</span></div><div class="fntrack"><i style="width:${Math.round(r[3]/fmax*100)}%;background:${r[2]}"></i></div></div>`).join('');
 // 14 day timeline
 const dayCounts=Array.from({length:14},(_,i)=>{const list=app.wrong.filter(w=>w.status!=='已攻克'&&Math.max(0,w.due)===i);return list;});const dmax=Math.max(1,...dayCounts.map(l=>l.length));
 const sch=dayCounts.map((list,i)=>{const d=new Date();d.setDate(d.getDate()+i);const wd='日一二三四五六'[d.getDay()];const wkend=(d.getDay()===0||d.getDay()===6);const segs=list.length?list.map(w=>`<div class="schseg" style="height:${Math.round(1/dmax*100)}%;background:${SUBJ[w.subj].color}"></div>`).join(''):'<div class="schdot"></div>';return `<div class="schday ${i===0?'today':''} ${wkend?'wkend':''}"><div class="schbarwrap">${segs}</div><div class="schcnt ${list.length?'':'zero'}">${list.length}</div><div class="schlbl">${d.getMonth()+1}/${d.getDate()}</div><div class="schwd">週${wd}</div></div>`;}).join('');
 const quiz=app.self.map(t=>{const col=t.score>=4?'var(--good)':(t.score>=3?'var(--warn)':'var(--bad)');return `<div class="quizrow"><div><div class="quizname">${esc(t.chapter)}</div><div class="quizsub">${t.date} · NotebookLM 出 5 題</div></div><span class="quizscore" style="color:${col}">${t.score}/5</span><span class="quizweak">弱點：${esc(t.weak)}</span><a class="nopen">↗</a><button class="btn ghost sm" data-editself="${t.id}">✎</button></div>`;}).join('')||'<div class="quizrow"><div class="quizsub" style="padding:8px">尚未有自測紀錄。</div></div>';
 $('#screen').innerHTML=`<div class="cardrow"><div class="scard"><div class="l">↻ 今日到期</div><div class="v disp" style="color:var(--bad)">${due.length}<u>題</u></div><div class="s">現在就清掉，趁記憶還在</div></div><div class="scard"><div class="l">📅 本週待複習</div><div class="v disp">${wk}<u>題</u></div><div class="s">平均每天 ${(wk/7).toFixed(1)} 題</div></div><div class="scard"><div class="l">🔥 連續複習</div><div class="v disp">${computeStreak()}<u>天</u></div><div class="s">每天清空佇列就 +1</div></div><div class="scard"><div class="l">🎯 攻克率</div><div class="v disp" style="color:var(--good)">${master}<u>%</u></div><div class="s">連對 3 次自動封存</div></div></div>

<div class="wtop"><div class="winsight"><div class="wi-h"><b>📌 錯因洞察</b><span>把「為什麼錯」變成「不再錯」</span></div><div class="wi-lead">你最常犯的是 <b style="color:${topCause.color}">${topCause.c}</b>（${app.wrong.length?Math.round(topCause.n/app.wrong.length*100):0}%）· ${CM[topCause.c][1]}</div><div class="causebars">${cbars}</div><div class="wi-foot">建議先補：<b>${topCause.c}</b> 這類錯題</div></div><div class="wstatcol"><div class="wstatgrid"><div class="wstat"><div class="wsv disp" style="color:var(--bad)">${due.length}</div><div class="wsl">今日待複習</div></div><div class="wstat"><div class="wsv disp">${app.wrong.length}</div><div class="wsl">錯題總數</div></div><div class="wstat"><div class="wsv disp" style="color:var(--warn)">${cnt(w=>w.status==='複習中')}</div><div class="wsl">複習中</div></div><div class="wstat"><div class="wsv disp" style="color:var(--good)">${cnt(w=>w.status==='已攻克')}</div><div class="wsl">已攻克</div></div></div><div class="masterbar"><div class="mbl"><span>攻克率</span><b class="disp">${master}%</b></div><div class="mbtrack"><i style="width:${master}%"></i></div></div><button class="btn pri" style="justify-content:center" id="addWrong">＋ 快速新增錯題</button></div></div>

function formula(){const forgotCount=Object.values(app.forgot).filter(Boolean).length;let list=app.formulas.slice();if(app.fSubj!=='全部')list=list.filter(f=>f.subj===app.fSubj);if(app.fOnly)list=list.filter(f=>app.forgot[f.id]);if(app.fSearch){const q=app.fSearch.toLowerCase();list=list.filter(f=>(f.name+f.disp+f.subj+(f.tags||[]).join('')).toLowerCase().includes(q));}
 const chips=['全部',...ORDER].map(s=>`<button class="fchip ${app.fSubj===s?'on':''}" data-fsubj="${s}">${s}</button>`).join('');
 const cards=list.map(f=>`<div class="fcard ${app.forgot[f.id]?'forgot':''}"><div class="fhead"><span class="fsubj" style="${pillStyle(f.subj)}">${f.subj}</span><button class="starbtn ${app.forgot[f.id]?'on':''}" data-forgot="${f.id}">★</button></div><div class="fname">${esc(f.name)}</div><div class="fmath" ${f.latex?`data-latex="${esc(f.latex)}"`:''}>${esc(f.disp)}</div><div class="fdesc">${esc(f.desc)}</div><div class="ftags">${(f.tags||[]).map(t=>`<span class="ftag">${esc(t)}</span>`).join('')}</div></div>`).join('')||'<div class="fcard"><div class="fdesc">沒有符合條件的公式。</div></div>';
 $('#screen').innerHTML=`<div class="ftoolbar"><div class="fsearch"><span class="fsicon">⌕</span><input type="text" id="fSearch" placeholder="搜尋公式、關鍵字、科目…" value="${esc(app.fSearch)}"></div><button class="pillbtn ${app.fOnly?'on':''}" id="onlyForgot">★ 只看常忘 (${forgotCount})</button><button class="btn pri" id="flash">⚡ 每日閃卡</button></div><div class="fchips">${chips}</div><div class="fcount">共 ${app.formulas.length} 條公式 · ☆ 點星號標記常忘，收進每日閃卡</div><div class="fogrid">${cards}</div>`;

/* ---------- MODALS: evo / promo / player / wrong / self / flash ---------- */
function evo(i){const d=subjects()[i],u=d.u;modal(`<div class="mhead"><div><h2>${u[0]} · 升遷路線</h2><div class="jobline">${u[1]} · 目前 ${d.p}% 精熟</div></div><button class="mclose" onclick="closeModal()">✕</button></div><div class="route">${u[3].map((t,k)=>`<div class="stage ${k+1===d.r?'cur':''} ${k+1>d.r?'lock':''}"><img src="assets/slimes/slime_${u[2]}_lv${k+1}.png"><div class="disp" style="font-size:16px">Lv.${k+1}</div><b style="font-size:12px">${esc(t)}</b><div class="sunit">${k+1>d.r?'🔒 未解鎖':'已解鎖'}</div></div>`).join('')}</div>`);}
function promo(i,from,to){const u=UNITS[i],gear=(GEAR[u[2]]||[])[to-2]||'新裝備';modal(`<div class="promo"><span class="tag">⬆ LEVEL UP · 升遷</span><h2>${u[0]} · ${u[1]}</h2><div class="promoStage"><div><img src="assets/slimes/slime_${u[2]}_lv${from}.png"><div class="sunit">Lv.${from}<br>${esc(u[3][from-1])}</div></div><div class="arrow">➜</div><div style="position:relative"><img src="assets/slimes/slime_${u[2]}_lv${to}.png">${Array.from({length:16},(_,k)=>`<i class="spark" style="--r:${k*22.5}deg"></i>`).join('')}<div class="sunit">Lv.${to}<br><b>${esc(u[3][to-1])}</b></div></div></div><div class="gear">🎁 新裝備解鎖 · ${esc(gear)}</div><h2>晉升為「${esc(u[3][to-1])}」</h2><button class="btn pri" onclick="closeModal()">收下這份晉升 ✦</button></div>`);}
function embed(url){if(!url)return null;let m=url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/|v\/))([\w-]{11})/);if(m)return{type:'youtube',id:m[1]};m=url.match(/drive\.google\.com\/file\/d\/([^/]+)/);if(m)return{type:'iframe',src:'https://drive.google.com/file/d/'+m[1]+'/preview'};m=url.match(/vimeo\.com\/(\d+)/);if(m)return{type:'iframe',src:'https://player.vimeo.com/video/'+m[1]+'?autoplay=1'};if(/\.(mp4|webm|ogg|mov)(\?|$)/i.test(url))return{type:'video',src:url};return{type:'iframe',src:url};}
function ensureYT(cb){if(window.YT&&window.YT.Player){cb();return;}if(!document.getElementById('yt-iframe-api')){const t=document.createElement('script');t.id='yt-iframe-api';t.src='https://www.youtube.com/iframe_api';document.head.appendChild(t);}let n=0;const iv=setInterval(()=>{if(window.YT&&window.YT.Player){clearInterval(iv);cb();}else if(++n>80)clearInterval(iv);},125);}
let trackIv=null,ytp=null,rate=1,lastSaved=0;
function saveProg(id,p){app.vProg[id]=Math.max(app.vProg[id]||0,p);if(app.serverOn&&String(id).includes('-')&&(app.vProg[id]-lastSaved>=5||app.vProg[id]>=100)){lastSaved=app.vProg[id];api('/api/videos/'+id,'PATCH',{進度:app.vProg[id]}).catch(()=>{});}saveLocal();}
function play(id){const v=app.videos.find(x=>x.id===id);if(!v)return;clearInterval(trackIv);lastSaved=app.vProg[id]||0;const e=embed(v.url);const body=!e?'尚未設定影片連結。可到章節清單「＋連結影片」貼上網址。':e.type==='youtube'?'<div id="ytmount"></div>':e.type==='video'?`<video id="nativeVideo" src="${esc(e.src)}" controls autoplay></video>`:`<iframe src="${esc(e.src)}" allow="autoplay; encrypted-media; fullscreen; picture-in-picture" allowfullscreen></iframe>`;modal(`<div class="mhead"><div><h2>${esc(v.title||v.chapter)}</h2><div class="jobline">${esc(v.subj)} · ${esc(v.chapter)}</div></div><button class="mclose" onclick="closeModal()">✕</button></div><div class="mhead" style="font-size:12px;color:var(--mut)"><span>進度 <b id="playPct">${app.vProg[id]||0}%</b></span><span>${v.min?v.min+' 分':'— 分'}</span></div><div class="player">${body}</div><div class="speedbar"><span style="font-size:11px;color:var(--mut)">倍速</span>${[1,1.25,1.5,2].map(r=>`<button class="${rate===r?'on':''}" data-rate="${r}">${r===1?'1x':r+'x'}</button>`).join('')}</div><p><button class="btn pri" id="markDoneBtn">標記已看完</button> <button class="btn" onclick="closeModal()">關閉</button></p>`);function upd(p){saveProg(id,p);const el=$('#playPct');if(el)el.textContent=(app.vProg[id]||0)+'%';}function br(apply){$$('[data-rate]').forEach(b=>b.onclick=()=>{rate=+b.dataset.rate;apply(rate);$$('[data-rate]').forEach(x=>x.classList.toggle('on',+x.dataset.rate===rate));});}if(e&&e.type==='youtube'){ensureYT(()=>{ytp=new YT.Player('ytmount',{height:'100%',width:'100%',videoId:e.id,playerVars:{rel:0,autoplay:1,playsinline:1,modestbranding:1},events:{onReady:ev=>{try{ev.target.setPlaybackRate(rate);}catch(_){}const d=ev.target.getDuration(),p=app.vProg[id]||0;if(d&&p>0&&p<100)ev.target.seekTo(d*p/100,true);trackIv=setInterval(()=>{const dur=ev.target.getDuration(),cur=ev.target.getCurrentTime();if(dur>0)upd(Math.min(100,Math.round(cur/dur*100)));},3000);},onStateChange:ev=>{if(ev.data===0)upd(100);}}});br(r=>{try{ytp.setPlaybackRate(r);}catch(_){}});});}else if(e&&e.type==='video'){const el=$('#nativeVideo');el.playbackRate=rate;el.onloadedmetadata=()=>{const p=app.vProg[id]||0;if(el.duration&&p>0&&p<100)el.currentTime=el.duration*p/100;};trackIv=setInterval(()=>{if(el.duration)upd(Math.min(100,Math.round(el.currentTime/el.duration*100)));},3000);el.onended=()=>upd(100);br(r=>el.playbackRate=r);}else br(()=>{});$('#markDoneBtn').onclick=()=>{upd(100);closeModal();render();};}
function promptText(){const s=app.timerSubj;return `請根據我在 NotebookLM 的「${s}」教材，出 5 題單選或計算題，難度貼近台灣電機技師高考，並附詳解與常見陷阱。作答後幫我指出我最該加強的觀念。`;}
function wrongForm(w){w=w||null;const opt=(arr,val)=>arr.map(o=>`<option ${o===val?'selected':''}>${o}</option>`).join('');modal(`<div class="mhead"><h2>${w?'編輯錯題':'新增錯題'}</h2><button class="mclose" onclick="closeModal()">✕</button></div><div class="field"><label>題目摘要</label><textarea id="wq">${w?esc(w.q):''}</textarea></div><div class="field"><label>科目</label><select id="wsubj">${opt(ORDER,w?w.subj:'工程數學')}</select></div><div class="field"><label>章節</label><input id="wch" value="${w?esc(w.chapter):''}"></div><div class="field"><label>卡點原因</label><select id="wcause">${opt(CAUSES,w?w.cause:'觀念不熟')}</select></div><div class="field"><label>盲點</label><input id="wblind" value="${w?esc(w.blind):''}"></div><div class="field"><label>正解重點</label><input id="wcorrect" value="${w?esc(w.correct):''}"></div><div class="field"><label>來源</label><input id="wsource" value="${w?esc(w.source):'自編'}"></div><p><button class="btn pri" id="saveWrong">儲存</button> <button class="btn" onclick="closeModal()">取消</button></p>`);$('#saveWrong').onclick=async()=>{const data={q:$('#wq').value,subj:$('#wsubj').value,chapter:$('#wch').value,cause:$('#wcause').value,blind:$('#wblind').value,correct:$('#wcorrect').value,source:$('#wsource').value};if(w){Object.assign(w,data);if(app.serverOn&&String(w.id).includes('-'))api('/api/wrong/'+w.id,'PATCH',{題目摘要:data.q,科目:data.subj,章節:data.chapter,卡點原因:data.cause,盲點:data.blind,正解重點:data.correct,來源:data.source}).catch(()=>{});}else{const nw={id:'w'+Date.now(),status:'新錯題',streak:0,due:0,...data};if(app.serverOn){try{const r=await api('/api/wrong','POST',{題目摘要:data.q,科目:data.subj,章節:data.chapter,卡點原因:data.cause,盲點:data.blind,正解重點:data.correct,來源:data.source});nw.id=r.id||nw.id;}catch(e){toast('已先存本機');}}app.wrong.unshift(nw);}closeModal();render();};}
function delWrong(id){if(!confirm('確定刪除這題錯題？'))return;app.wrong=app.wrong.filter(w=>w.id!==id);if(app.serverOn&&String(id).includes('-'))api('/api/wrong/'+id,'DELETE').catch(()=>{});render();}
function startReview(id){const w=app.wrong.find(x=>x.id===id);if(!w)return;modal(`<div class="mhead"><h2>複習重練</h2><button class="mclose" onclick="closeModal()">✕</button></div><span class="pill" style="${pillStyle(w.subj)}">● ${w.subj}</span><div class="dq" style="margin:10px 0;font-size:15px">${esc(w.q)}</div><details><summary style="cursor:pointer;color:var(--pri2)">看盲點與正解</summary><div class="qnote" style="margin-top:8px">🚫 盲點：${esc(w.blind)}<br>✅ 正解：${esc(w.correct)}</div></details><p style="margin-top:14px">這次做對了嗎？</p><p><button class="btn pri" data-grade="1">✅ 答對</button> <button class="btn" data-grade="0">❌ 答錯</button></p>`);$$('[data-grade]').forEach(b=>b.onclick=()=>grade(id,+b.dataset.grade));}
function grade(id,ok){const w=app.wrong.find(x=>x.id===id);if(!w)return;const gaps=[1,3,7,14,30];if(ok){w.streak=(w.streak||0)+1;w.due=gaps[Math.min(w.streak-1,gaps.length-1)];w.status=w.streak>=3?'已攻克':'複習中';}else{w.streak=0;w.due=gaps[0];w.status='複習中';}if(app.serverOn&&String(w.id).includes('-'))api('/api/wrong/'+w.id+'/review','PATCH',{ok:!!ok}).catch(()=>{});closeModal();toast(ok?(w.status==='已攻克'?'已攻克，封存！':'答對，往後排 '+w.due+' 天'):'答錯，明天再練');render();}
function selfForm(t){t=t||null;modal(`<div class="mhead"><h2>${t?'編輯自測':'記錄自測'}</h2><button class="mclose" onclick="closeModal()">✕</button></div><div class="field"><label>章節</label><input id="sfch" value="${t?esc(t.chapter):''}"></div><div class="field"><label>日期</label><input id="sfdate" value="${t?esc(t.date):((new Date().getMonth()+1)+'/'+new Date().getDate())}"></div><div class="field"><label>得分（0-5）</label><input id="sfscore" type="number" min="0" max="5" value="${t?t.score:4}"></div><div class="field"><label>弱點備註</label><input id="sfweak" value="${t?esc(t.weak):''}"></div><p><button class="btn pri" id="saveSelf">儲存</button> ${t?`<button class="btn" id="delSelf">刪除</button>`:''} <button class="btn" onclick="closeModal()">取消</button></p>`);$('#saveSelf').onclick=()=>{const data={chapter:$('#sfch').value,date:$('#sfdate').value,score:+$('#sfscore').value,weak:$('#sfweak').value};if(t)Object.assign(t,data);else app.self.unshift({id:'s'+Date.now(),...data});closeModal();render();};if(t&&$('#delSelf'))$('#delSelf').onclick=()=>{app.self=app.self.filter(x=>x.id!==t.id);closeModal();render();};}
function exportSelf(){const md='# 自測弱點彙整\n\n'+ORDER.map(s=>{const rows=app.self.filter(t=>true);return '';}).join('')+app.self.map(t=>`## ${t.chapter}（${t.date}） ${t.score}/5\n- 弱點：${t.weak}\n`).join('\n');download('selftest-weakness-'+today()+'.md',md);}
let flashDeck=[],flashIdx=0,flashFlip=false;
function showFlash(){const f=flashDeck[flashIdx];if(!f){closeModal();toast('閃卡完成 🎉');return;}modal(`<div class="mhead"><h2>每日閃卡 <span class="badge">${flashIdx+1} / ${flashDeck.length}</span></h2><button class="mclose" onclick="closeModal()">✕</button></div><div class="flashcard" id="flashCard"><span class="fsubj" style="${pillStyle(f.subj)}">${f.subj}</span><div class="fname">${esc(f.name)}</div>${flashFlip?`<div class="fmath" ${f.latex?`data-latex="${esc(f.latex)}"`:''}>${esc(f.disp)}</div><div class="fdesc">${esc(f.desc)}</div>`:'<div class="fdesc">點卡片看公式與重點</div>'}</div><p style="text-align:center;margin-top:12px">${flashFlip?`<button class="btn pri" id="flashNext">下一張 ▶</button>`:`<button class="btn" id="flashDo">翻開 ↺</button>`}</p>`);renderKatex();if($('#flashCard'))$('#flashCard').onclick=()=>{flashFlip=true;showFlash();};if($('#flashDo'))$('#flashDo').onclick=()=>{flashFlip=true;showFlash();};if($('#flashNext'))$('#flashNext').onclick=()=>{flashIdx++;flashFlip=false;showFlash();};}

/* ---------- RENDER + BIND ---------- */
const SCREENS={home,chapters,review,formula};
function render(){renderSide();renderTop();(SCREENS[app.screen]||home)();bind();saveLocal();}
function bind(){
 $$('[data-go]').forEach(b=>b.onclick=()=>{app.screen=b.dataset.go;render();});
 if($('#openNotion'))$('#openNotion').onclick=()=>{const u=app.notionHomeUrl||window.NOTION_HOME_URL||'';if(u)window.open(u,'_blank');else toast('尚未設定 NOTION_HOME_URL');};
 if($('#finishDay'))$('#finishDay').onclick=()=>{bankSession();app.running=false;const k=lkey();app.plan[k]=app.plan[k]||{items:[],done:false};app.plan[k].done=true;saveDaily();toast('已標記今日進度完成 · 連續 '+computeStreak()+' 天');render();};
 $('#modalBg').onclick=e=>{if(e.target.id==='modalBg')closeModal();};
 $$('[data-play]').forEach(b=>b.onclick=()=>play(b.dataset.play));
 $$('[data-evo]').forEach(b=>b.onclick=()=>evo(+b.dataset.evo));
 if($('#quoteBtn'))$('#quoteBtn').onclick=()=>{app.quote=(app.quote+1)%QUOTES.length;render();};
 $$('[data-timersubj]').forEach(b=>b.onclick=()=>{app.timerSubj=b.dataset.timersubj;render();});
 if($('#timerRun'))$('#timerRun').onclick=()=>{if(app.running){bankSession();app.running=false;toast('已暫停並歸入累計');}else{app.running=true;}render();};
 if($('#distraction'))$('#distraction').onclick=()=>{app.distractions++;toast('已記錄一次分心');render();};
 if($('#resetToday'))$('#resetToday').onclick=()=>{if(confirm('歸零今日累積時數？')){app.focus={};app.session=0;toast('已歸零今日累積');render();}};
 if($('#resetWeek'))$('#resetWeek').onclick=()=>{if(confirm('歸零本週累積時數？')){app.week={};toast('已歸零本週累積');render();}};
 if($('#resetDistract'))$('#resetDistract').onclick=()=>{app.distractions=0;toast('已歸零分心紀錄');render();};
 $$('[data-startq]').forEach(b=>b.onclick=()=>{const q=quests()[+b.dataset.startq];if(q){bankSession();app.timerSubj=q.subj;app.running=true;const k=lkey();app.plan[k]=app.plan[k]||{items:[],done:false};if(!app.plan[k].items.some(it=>it.chapter===q.name))app.plan[k].items.push({subj:q.subj,chapter:q.name});app.questDone['q'+b.dataset.startq]=true;render();const fb=document.querySelector('.focusband');if(fb)fb.scrollIntoView({behavior:'smooth',block:'center'});toast('已開始專注並加入今日計畫：'+q.name);}});
 if($('#copyPrompt'))$('#copyPrompt').onclick=()=>copy(promptText());
 if($('#openNb'))$('#openNb').onclick=()=>window.open((app.notebooks[app.timerSubj]&&app.notebooks[app.timerSubj].url)||'https://notebooklm.google.com/','_blank');
 if($('#addSelf'))$('#addSelf').onclick=()=>selfForm();
 if($('#addSelf2'))$('#addSelf2').onclick=()=>selfForm();
 if($('#exportSelf'))$('#exportSelf').onclick=exportSelf;
 if($('#exportSelf2'))$('#exportSelf2').onclick=exportSelf;
 $$('[data-editself]').forEach(b=>b.onclick=()=>selfForm(app.self.find(t=>t.id===b.dataset.editself)));
 $$('[data-chview]').forEach(b=>b.onclick=()=>{app.chView=b.dataset.chview;render();});
 $$('[data-status]').forEach(s=>s.onchange=()=>{const c=app.chapters.find(c=>c.id===s.dataset.status),old=rank(c.subj);c.status=s.value;if(app.serverOn&&String(c.id).includes('-'))api('/api/chapters/'+c.id,'PATCH',{狀態:s.value}).catch(()=>{});const nr=rank(c.subj),idx=ORDER.indexOf(c.subj);render();if(nr>old)promo(idx,old,nr);});
 $$('[data-rec]').forEach(b=>b.onclick=()=>{const c=app.chapters.find(c=>c.id===b.dataset.rec);c.rec=!c.rec;if(app.serverOn&&String(c.id).includes('-'))api('/api/chapters/'+c.id,'PATCH',{已錄影:c.rec}).catch(()=>{});render();});
 $$('[data-linkvideo]').forEach(b=>b.onclick=async()=>{const c=app.chapters.find(c=>c.id===b.dataset.linkvideo),url=prompt('貼上影片連結（YouTube／Drive／Vimeo／mp4）');if(!url)return;const v=vfor(c);if(v){v.url=url;if(app.serverOn&&String(v.id).includes('-')){try{const r=await api('/api/videos/'+v.id,'PATCH',{影片連結:url});v.url=r.url||url;}catch(e){toast('連結已存本機');}}}else{const tmp={id:'v'+Date.now(),subj:c.subj,chapter:c.name,title:c.name,min:0,prog:0,url};app.videos.push(tmp);if(app.serverOn){try{const r=await api('/api/videos','POST',{科目:c.subj,章節:c.name,標題:c.name,影片連結:url,時長分:0,進度:0});app.videos=app.videos.map(x=>x.id===tmp.id?{id:r.id,subj:r.subj,chapter:r.chapter,title:r.title,min:r.min||0,prog:r.prog||0,url:r.url||url}:x);toast('已新增影片並同步 Notion');}catch(e){toast('影片已存本機');}}}render();});
 if($('#radioPrompt'))$('#radioPrompt').onclick=()=>copy('請用 Podcast 對談方式逐題講解以下錯題：\n'+app.wrong.filter(w=>w.status!=='已攻克'&&w.due<=0).map(w=>w.q+'｜盲點：'+w.blind+'｜正解：'+w.correct).join('\n'));
 if($('#exportWrong'))$('#exportWrong').onclick=()=>download('wrong-export-'+today()+'.md','# 錯題總表\n\n'+app.wrong.map(w=>`## ${w.subj} · ${w.q}\n- 章節：${w.chapter}\n- 卡點：${w.cause}\n- 盲點：${w.blind}\n- 正解：${w.correct}\n`).join('\n'));
 if($('#addWrong'))$('#addWrong').onclick=()=>wrongForm();
 $$('[data-review]').forEach(b=>b.onclick=()=>startReview(b.dataset.review));
 if($('#fSearch'))$('#fSearch').oninput=e=>{app.fSearch=e.target.value;const list=app.formulas;render();const inp=$('#fSearch');if(inp){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length);}};
 if($('#onlyForgot'))$('#onlyForgot').onclick=()=>{app.fOnly=!app.fOnly;render();};
 $$('[data-fsubj]').forEach(b=>b.onclick=()=>{app.fSubj=b.dataset.fsubj;render();});
 $$('[data-forgot]').forEach(b=>b.onclick=()=>{const id=b.dataset.forgot;if(app.forgot[id])delete app.forgot[id];else app.forgot[id]=true;if(app.serverOn&&String(id).includes('-'))api('/api/formulas/'+id,'PATCH',{常忘:!!app.forgot[id]}).catch(()=>{});render();});
 $$('[data-delwrong]').forEach(b=>b.onclick=()=>delWrong(b.dataset.delwrong));
 if($('#flash'))$('#flash').onclick=()=>{const pool=app.formulas.filter(f=>app.forgot[f.id]);flashDeck=(pool.length?pool:app.formulas).slice().sort(()=>Math.random()-.5).slice(0,Math.min(6,app.formulas.length));flashIdx=0;flashFlip=false;showFlash();};
 if($('#startPlan'))$('#startPlan').onclick=()=>{app.planStart=lkey();toast('已開始備考計畫，四波已重新分配');render();};
 if($('#resetPlan'))$('#resetPlan').onclick=()=>{if(confirm('重設計畫起點為今天？')){app.planStart=lkey();render();}};
 $$('[data-day]').forEach(el=>el.onclick=()=>dayModal(el.dataset.day));
 if($('#calPrev'))$('#calPrev').onclick=()=>{app.calOff=(app.calOff||0)-1;render();};
 if($('#calNext'))$('#calNext').onclick=()=>{app.calOff=(app.calOff||0)+1;render();};
}
window.addEventListener('pagehide',()=>saveDaily(true));
let tick=setInterval(()=>{if(app.running){app.session++;const lt=document.querySelector('.ltime');if(lt)lt.textContent=fmtSess();}},1000);
restore();
if(app.chView==='cards')app.chView='table';
if(app.calOff==null)app.calOff=0;
if(app.session==null)app.session=0;
if(!app.week||!Object.keys(app.week).length)app.week={'工程數學':2400,'電路學':5400,'電子學':3600,'電機機械':4200,'電力系統':3000,'工業配電':1800};
if(!app.plan||!Object.keys(app.plan).length){app.plan={};for(let i=1;i<=3;i++){const d=new Date();d.setDate(d.getDate()-i);app.plan[lkey(d)]={items:[{subj:ORDER[i%6],chapter:CH[i][1]}],done:true};}const tk=lkey();app.plan[tk]=app.plan[tk]||{items:[{subj:'工程數學',chapter:CH[2][1]}],done:false};}
app._syncedOnce=false;
render();
loadConfig();
loadServer();
setTimeout(()=>{app._syncedOnce=true;},9000);

</script>
